<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Dining Guide</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f8f6f2] font-sans">

<div class="max-w-md mx-auto p-4">

<!-- CHAT AREA -->
<div id="chat" class="flex flex-col gap-4"></div>

<!-- OPTIONS -->
<div id="options" class="mt-6 flex flex-col gap-3"></div>

</div>

<script>
const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addBot(text){
  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-xl shadow text-sm";
  div.innerText = text;
  chat.appendChild(div);
}

function addUser(text){
  const div = document.createElement("div");
  div.className = "bg-[#c9a96e] text-white p-3 rounded-xl self-end text-sm";
  div.innerText = text;
  chat.appendChild(div);
}

function setOptions(list){
  options.innerHTML = "";
  list.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "bg-white border p-4 rounded-xl text-left shadow";
    btn.innerText = opt.label;
    btn.onclick = ()=> opt.action();
    options.appendChild(btn);
  });
}

/* ========= FLOW ========= */

function start(){
  addBot("Hi! Are you looking for a special dining experience in Tokyo?");
  
  setOptions([
    {label:"Looking for Halal food", action: halal},
    {label:"First time in Japan", action: first},
    {label:"Something unique", action: unique},
    {label:"Just exploring", action: explore}
  ]);
}

/* -------- HALAL -------- */
function halal(){
  addUser("Looking for Halal food");
  addBot("Great choice. This restaurant is fully Halal-friendly.\n\n✔ No pork\n✔ No alcohol\n✔ Muslim-friendly");

  setOptions([
    {label:"Tell me more", action: experience},
  ]);
}

/* -------- FIRST -------- */
function first(){
  addUser("First time in Japan");
  addBot("No worries! This experience is perfect for beginners.\n\n✔ English support\n✔ Easy to understand\n✔ Guided by chef");

  setOptions([
    {label:"What is the experience?", action: experience},
  ]);
}

/* -------- UNIQUE -------- */
function unique(){
  addUser("Something unique");
  addBot("This is not just a meal.\n\nIt's a live Omakase experience with Wagyu and Sushi.");

  setOptions([
    {label:"Sounds interesting", action: experience},
  ]);
}

/* -------- EXPLORE -------- */
function explore(){
  addUser("Just exploring");
  addBot("Let me show you one of the most recommended dining experiences in Tokyo.");

  setOptions([
    {label:"Show me", action: experience},
  ]);
}

/* -------- EXPERIENCE -------- */
function experience(){
  addUser("Tell me more");
  addBot("You sit in front of the chef.\n\n✔ Sushi made one by one\n✔ A5 Wagyu sliced in front of you\n✔ Interactive experience\n\nIt feels like a performance.");

  
  setOptions([
    {label:"Price?", action: price},
    {label:"Is it worth it?", action: trust}
  ]);
}

/* -------- PRICE -------- */
function price(){
  addUser("Price?");
  addBot("The experience starts from around ¥20,000.\n\nMost guests say it's the highlight of their Tokyo trip.");

  
  setOptions([
    {label:"Show me the restaurant", action: recommend}
  ]);
}

/* -------- TRUST -------- */
function trust(){
  addUser("Is it worth it?");
  addBot("Guests say:\n\n⭐ Best meal in Tokyo\n⭐ Worth every yen\n⭐ Unforgettable experience");

  
  setOptions([
    {label:"Show me the restaurant", action: recommend}
  ]);
}

/* -------- FINAL -------- */
function recommend(){
  addUser("Show me the restaurant");

  addBot("Based on what you're looking for, this is the best match for you 👇");

  addBot("🏆 Omakase Sushi & Wagyu Experience (Halal Friendly)\n\n✔ Premium Wagyu\n✔ Omakase Sushi\n✔ Halal certified\n✔ Located in Shinjuku");

  
  options.innerHTML = `
    <a href="https://www.google.com/maps/place/Tokyo+Omakase+Sushi+Wagyu+(Halal)+Shinjuku+Restaurant/" 
       target="_blank"
       class="bg-[#c9a96e] text-white text-center p-4 rounded-xl shadow">
       View Location (Google Maps)
    </a>

    <a href="https://www.tablecheck.com/shops/halal-wagyu-shinjuku-5w-tokyo/reserve"
       target="_blank"
       class="bg-black text-white text-center p-4 rounded-xl shadow">
       Reserve Now
    </a>
  `;
}

start();
</script>

</body>
</html>
