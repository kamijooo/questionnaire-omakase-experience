<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Dining Guide</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f8f6f2; }
.chat { max-width:420px; margin:auto; }
.fade { animation:fadeIn .4s ease forwards; }
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<div class="chat p-4">

<div class="text-center mb-6">
  <h1 class="text-lg font-semibold">Tokyo Dining Guide</h1>
  <p class="text-xs text-gray-500">Find your perfect restaurant</p>
</div>

<div id="chat" class="flex flex-col gap-3"></div>
<div id="options" class="mt-6 flex flex-col gap-3"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

let answers = {};

function bot(text){
  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-2xl shadow text-sm fade";
  div.innerText = text;
  chat.appendChild(div);
}

function user(text){
  const div = document.createElement("div");
  div.className = "bg-[#c9a96e] text-white p-3 rounded-2xl self-end text-sm fade";
  div.innerText = text;
  chat.appendChild(div);
}

function setOptions(arr){
  options.innerHTML = "";
  arr.forEach(o=>{
    const btn = document.createElement("button");
    btn.className = "bg-white border p-4 rounded-xl shadow text-left hover:bg-gray-50 active:scale-95 transition fade";
    btn.innerText = o.label;
    btn.onclick = ()=> o.action();
    options.appendChild(btn);
  });
}

/* ===== Q1 ===== */
function start(){
  bot("Let's find the best dining experience for you in Tokyo.");

  setTimeout(()=>{
    bot("Q1. What is most important for you?");
    
    setOptions([
      {label:"Halal-friendly", action: ()=>{answers.q1="halal"; q2();}},
      {label:"Luxury experience", action: ()=>{answers.q1="luxury"; q2();}},
      {label:"Casual / Easy", action: ()=>{answers.q1="easy"; q2();}}
    ]);
  },500);
}

/* ===== Q2 ===== */
function q2(){
  user("Selected");
  bot("Q2. What kind of food excites you most?");

  setOptions([
    {label:"Wagyu", action: ()=>{answers.q2="wagyu"; q3();}},
    {label:"Sushi", action: ()=>{answers.q2="sushi"; q3();}},
    {label:"Both", action: ()=>{answers.q2="both"; q3();}}
  ]);
}

/* ===== Q3 ===== */
function q3(){
  user("Selected");
  bot("Q3. What kind of experience do you want?");

  setOptions([
    {label:"Chef performance", action: ()=>{answers.q3="performance"; q4();}},
    {label:"Relaxed dining", action: ()=>{answers.q3="relax"; q4();}},
    {label:"Not sure", action: ()=>{answers.q3="any"; q4();}}
  ]);
}

/* ===== Q4 ===== */
function q4(){
  user("Selected");
  bot("Q4. What is your budget range?");

  setOptions([
    {label:"Around ¥10,000", action: ()=>{answers.q4="low"; result();}},
    {label:"¥20,000+", action: ()=>{answers.q4="mid"; result();}},
    {label:"Premium experience", action: ()=>{answers.q4="high"; result();}}
  ]);
}

/* ===== RESULT ===== */
function result(){
  user("Selected");

  bot("Analyzing your preferences...");

  setTimeout(()=>{
    bot("This is the best match for you 👇");

    const card = document.createElement("div");
    card.className = "bg-white p-4 rounded-2xl shadow fade";

    card.innerHTML = `
      <h3 class="font-semibold mb-2">Omakase Sushi & Wagyu Experience</h3>
      <p class="text-sm text-gray-600 mb-3">
        ✔ Halal-friendly<br>
        ✔ Wagyu & Sushi course<br>
        ✔ Live chef experience<br>
        ✔ Located in Shinjuku
      </p>
    `;

    chat.appendChild(card);

    options.innerHTML = `
      <a href="https://www.google.com/maps/place/Tokyo+Omakase+Sushi+Wagyu+(Halal)+Shinjuku+Restaurant/"
         target="_blank"
         class="bg-[#c9a96e] text-white text-center p-4 rounded-xl shadow fade">
         View Location
      </a>

      <a href="https://www.tablecheck.com/shops/halal-wagyu-shinjuku-5w-tokyo/reserve"
         target="_blank"
         class="bg-black text-white text-center p-4 rounded-xl shadow fade">
         Reserve Now
      </a>
    `;

  },800);
}

start();

</script>

</body>
</html>
