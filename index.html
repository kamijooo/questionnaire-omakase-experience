<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Dining Guide</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#f8f6f2;
}
.chat-container {
  max-width:420px;
  margin:auto;
}
.fade {
  animation: fadeIn 0.4s ease forwards;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<div class="chat-container p-4">

<!-- HEADER -->
<div class="text-center mb-6">
  <h1 class="text-lg font-semibold">Tokyo Dining Guide</h1>
  <p class="text-xs text-gray-500">Find your perfect dining experience</p>
</div>

<!-- CHAT -->
<div id="chat" class="flex flex-col gap-3"></div>

<!-- OPTIONS -->
<div id="options" class="mt-6 flex flex-col gap-3"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

function bot(text){
  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-2xl shadow text-sm fade";
  div.innerText = text;
  chat.appendChild(div);
}

function user(text){
  const div = document.createElement("div");
  div.className = "bg-[#c9a96e] text-white p-3 rounded-2xl self-end text-sm fade";
  div.innerText = text;
  chat.appendChild(div);
}

function setOptions(arr){
  options.innerHTML = "";
  arr.forEach(o=>{
    const btn = document.createElement("button");
    btn.className = "bg-white border p-4 rounded-xl shadow text-left hover:bg-gray-50 active:scale-95 transition fade";
    btn.innerText = o.label;
    btn.onclick = ()=> o.action();
    options.appendChild(btn);
  });
}

/* ===== FLOW ===== */

function start(){
  bot("Let's find the best dining experience for you in Tokyo.");

  setTimeout(()=>{
    bot("First, what are you looking for?");
    
    setOptions([
      {label:"Halal-friendly food", action:q2_halal},
      {label:"Luxury experience", action:q2_lux},
      {label:"First time in Japan", action:q2_first}
    ]);

  },500);
}

/* ===== Q2 ===== */

function q2_halal(){
  user("Halal-friendly food");
  bot("Got it. We'll find something you can enjoy safely.");

  setTimeout(()=>{
    bot("What kind of experience would you like?");
    
    setOptions([
      {label:"Wagyu", action:q3},
      {label:"Sushi", action:q3},
      {label:"Both", action:q3}
    ]);
  },500);
}

function q2_lux(){
  user("Luxury experience");
  bot("Perfect. Something unforgettable.");

  setTimeout(()=>{
    bot("What kind of experience would you like?");
    
    setOptions([
      {label:"Wagyu", action:q3},
      {label:"Sushi", action:q3},
      {label:"Both", action:q3}
    ]);
  },500);
}

function q2_first(){
  user("First time in Japan");
  bot("No worries. We'll keep it simple and enjoyable.");

  setTimeout(()=>{
    bot("What kind of experience would you like?");
    
    setOptions([
      {label:"Wagyu", action:q3},
      {label:"Sushi", action:q3},
      {label:"Both", action:q3}
    ]);
  },500);
}

/* ===== Q3 ===== */

function q3(){
  user("Selected");
  
  bot("Great choice.");

  setTimeout(()=>{
    bot("Based on your preferences, this is the best match for you 👇");

    recommend();
  },800);
}

/* ===== FINAL ===== */

function recommend(){

  const card = document.createElement("div");
  card.className = "bg-white p-4 rounded-2xl shadow fade";

  card.innerHTML = `
    <h3 class="font-semibold mb-2">Omakase Sushi & Wagyu Experience</h3>
    <p class="text-sm text-gray-600 mb-3">
      ✔ Halal-friendly<br>
      ✔ Wagyu & Sushi course<br>
      ✔ Live chef experience<br>
      ✔ Located in Shinjuku
    </p>
  `;

  chat.appendChild(card);

  options.innerHTML = `
    <a href="https://www.google.com/maps/place/Tokyo+Omakase+Sushi+Wagyu+(Halal)+Shinjuku+Restaurant/"
       target="_blank"
       class="bg-[#c9a96e] text-white text-center p-4 rounded-xl shadow fade">
       View Location
    </a>

    <a href="https://www.tablecheck.com/shops/halal-wagyu-shinjuku-5w-tokyo/reserve"
       target="_blank"
       class="bg-black text-white text-center p-4 rounded-xl shadow fade">
       Reserve Now
    </a>
  `;
}

start();

</script>

</body>
</html>
